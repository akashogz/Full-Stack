spring.application.name=job-portal-backend

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/jobportal
spring.data.mongodb.database=jobportal

# Server
server.port=8080

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890AbcDefGhi
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/resumes

# Logging
logging.level.com.jobportal=DEBUG
